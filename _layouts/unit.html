---
layout: default
---
<div class="breadcrumb">
  <a href="{{ '/' | relative_url }}">Home</a>
  <span class="sep">/</span>
  <a href="{{ page.level_url | relative_url }}">{{ page.level }}</a>
  <span class="sep">/</span>
  <span>{{ page.title }}</span>
</div>

<div class="unit-header">
  <h1>{{ page.title }}</h1>
  <p>{{ page.description }}</p>
</div>

<div class="topic-grid">
  {{ content }}
</div>
