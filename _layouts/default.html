<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/prism-custom.css' | relative_url }}">
</head>
<body>
  {% include header.html %}
  <main class="container">
    {{ content }}
  </main>
  <footer>
    <p>WJEC Computer Science Revision Guide</p>
  </footer>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    // Convert Jekyll ```mermaid code blocks into <pre class="mermaid"> for Mermaid.js
    document.querySelectorAll('pre > code.language-mermaid').forEach(function(codeEl) {
      var pre = codeEl.parentElement;
      pre.className = 'mermaid';
      pre.textContent = codeEl.textContent;
    });
    mermaid.initialize({
      startOnLoad: true,
      theme: 'dark',
      themeVariables: {
        darkMode: true,
        background: '#1a1d27',
        primaryColor: '#2d3148',
        primaryTextColor: '#e1e4ed',
        primaryBorderColor: '#6c8aff',
        lineColor: '#6c8aff',
        secondaryColor: '#242836',
        tertiaryColor: '#1a1d27',
        fontFamily: '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif',
        fontSize: '14px',
        nodeBorder: '#6c8aff',
        clusterBkg: '#242836',
        clusterBorder: '#2d3148',
        edgeLabelBackground: '#1a1d27',
        nodeTextColor: '#e1e4ed'
      }
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-visual-basic.min.js"></script>
  <script>
    // Wrap tables
    document.querySelectorAll('.topic-content table').forEach(function(table) {
      var wrapper = document.createElement('div');
      wrapper.className = 'table-wrap';
      table.parentNode.insertBefore(wrapper, table);
      wrapper.appendChild(table);
    });

    // Add language label + copy button to code blocks
    document.querySelectorAll('.topic-content pre > code').forEach(function(codeEl) {
      var pre = codeEl.parentElement;
      if (codeEl.classList.contains('language-mermaid')) return;
      var lang = '';
      codeEl.classList.forEach(function(c) {
        if (c.startsWith('language-')) lang = c.replace('language-', '');
      });

      var wrapper = document.createElement('div');
      wrapper.className = 'code-block';
      pre.parentNode.insertBefore(wrapper, pre);
      wrapper.appendChild(pre);

      var header = document.createElement('div');
      header.className = 'code-header';

      var label = document.createElement('span');
      label.className = 'code-lang';
      var langNames = { python: 'Python', vb: 'VB.NET', 'visual-basic': 'VB.NET', javascript: 'JavaScript', html: 'HTML', css: 'CSS', java: 'Java' };
      label.textContent = langNames[lang] || lang.toUpperCase() || 'Code';

      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', function() {
        navigator.clipboard.writeText(codeEl.textContent).then(function() {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(function() {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
          }, 2000);
        });
      });

      header.appendChild(label);
      header.appendChild(btn);
      wrapper.insertBefore(header, pre);
    });
  </script>
  <script>
    // Link key-term bold text to glossary entries
    document.querySelectorAll('.key-term').forEach(function(el) {
      var bold = el.querySelector('strong');
      if (!bold) return;
      var term = bold.textContent.trim();
      var slug = term.toLowerCase().replace(/[()]/g, '').replace(/[\/\s]+/g, '-');
      var link = document.createElement('a');
      link.href = '{{ "/glossary/" | relative_url }}#term-' + slug;
      link.className = 'key-term-link';
      link.innerHTML = bold.innerHTML;
      bold.innerHTML = '';
      bold.appendChild(link);
    });
  </script>
</body>
</html>
