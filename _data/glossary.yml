- term: "Absolute error"
  definition: "is the magnitude of the difference between the true value and the approximated value: |true value - stored value|. **Relative error** is the absolute error expressed as a proportion of the true value: absolute error / |true value|. It is often expressed as a percentage."
  level: "A2"
  source: "/a2/unit4/data-representation/"

- term: "Abstraction"
  definition: "is the process of hiding complex implementation details and exposing only the essential features to the user. In OOP, abstract classes and interfaces define what an object can do without specifying how it does it."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "Abstraction"
  definition: "is the process of removing unnecessary detail from a problem so you can focus on the important parts."
  level: "GCSE"
  source: "/gcse/unit2/problem-solving/"

- term: "Abstraction"
  definition: "in programming means representing real-world entities using only the attributes and behaviours that are relevant to the problem being solved."
  level: "GCSE"
  source: "/gcse/unit2/problem-solving/"

- term: "Acceptable use policy (AUP)"
  definition: "a set of rules that users must agree to follow in order to use an organisation's IT systems. **Disaster recovery policy (DRP)** — a documented plan for restoring IT systems and data after a major incident."
  level: "GCSE"
  source: "/gcse/unit1/security-data-management/"

- term: "ADC (Analogue-to-Digital Converter)"
  definition: "converts continuous analogue signals into discrete digital data. A **DAC (Digital-to-Analogue Converter)** does the reverse. These are essential for interfacing between the analogue real world and digital computers."
  level: "AS"
  source: "/as/unit1/hardware-communication/"

- term: "Agile"
  definition: "is an iterative and incremental approach to software development that delivers working software in short cycles called **sprints** (typically 1--4 weeks). It embraces change, values collaboration, and prioritises working software over comprehensive documentation."
  level: "A2"
  source: "/a2/unit3/systems-analysis/"

- term: "Agile development"
  definition: "is an iterative approach where the system is developed in short cycles called **iterations** (or **sprints**, typically 2-4 weeks). Each iteration produces a working increment of the software that can be reviewed and tested by the client."
  level: "AS"
  source: "/as/unit1/systems-analysis/"

- term: "algorithm"
  definition: "is a finite, ordered sequence of unambiguous instructions that, given a set of inputs, produces a defined set of outputs and terminates in a finite amount of time."
  level: "AS"
  source: "/as/unit1/algorithms-programs/"

- term: "Alpha testing"
  definition: "is testing done in-house before release. **Beta testing** is testing done by external users in a real-world environment before the final release."
  level: "AS"
  source: "/as/unit1/software-testing/"

- term: "Amdahl's Law"
  definition: "states that the maximum speedup of a program through parallelisation is limited by the proportion of the program that must remain sequential. No matter how many processors are added, the sequential portion creates an upper bound on performance improvement."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "Annotation"
  definition: "- comments added to the code to explain what it does. Comments are ignored by the computer when the program runs."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "Archiving"
  definition: "moving data that is no longer actively used to a separate, long-term storage medium. The data is preserved but removed from the main system."
  level: "GCSE"
  source: "/gcse/unit1/security-data-management/"

- term: "Argument"
  definition: "- The actual value passed to a subroutine when it is called."
  level: "AS"
  source: "/as/unit2/programming-skills/"

- term: "Arithmetic shift left"
  definition: "works identically to logical shift left: bits move left, vacated positions on the right are filled with 0s. The sign bit may change, potentially causing overflow."
  level: "A2"
  source: "/a2/unit4/data-representation/"

- term: "Arithmetic shift right"
  definition: "moves all bits to the right by the specified number of positions. Vacated positions on the left are filled with a copy of the **sign bit** (the MSB). This preserves the sign of the number, making it suitable for dividing signed (two's complement) numbers by powers of 2."
  level: "A2"
  source: "/a2/unit4/data-representation/"

- term: "Array"
  definition: "- a fixed-size, ordered collection of elements of the same data type, stored in contiguous memory locations. Elements are accessed directly using one or more index values, giving O(1) random access."
  level: "A2"
  source: "/a2/unit3/data-structures/"

- term: "array"
  definition: "is an ordered, fixed-size collection of elements of the same data type, stored in contiguous memory locations. Each element is accessed by its index."
  level: "AS"
  source: "/as/unit1/data-structures/"

- term: "Array"
  definition: "- An ordered, fixed-size collection of elements of the same data type, accessed by index."
  level: "AS"
  source: "/as/unit2/programming-skills/"

- term: "Array"
  definition: "an ordered collection of elements of the same data type, accessed by index. **Record** — a collection of related fields of potentially different data types, representing a single entity."
  level: "GCSE"
  source: "/gcse/unit1/data-organisation/"

- term: "Array"
  definition: "- A data structure that stores a fixed collection of elements of the same data type, accessed by index."
  level: "GCSE"
  source: "/gcse/unit2/data-structures-types/"

- term: "ASCII"
  definition: "is a 7-bit character encoding standard representing 128 characters, primarily English letters, digits, and symbols. **Unicode** is a universal standard that assigns a unique code point to every character from every writing system, with UTF-8 being its most common encoding."
  level: "AS"
  source: "/as/unit1/data-representation/"

- term: "ASCII"
  definition: "a 7-bit character encoding standard representing 128 characters, primarily English letters, digits, and symbols. **Unicode** — a universal character encoding standard that can represent characters from all of the world's writing systems."
  level: "GCSE"
  source: "/gcse/unit1/data-organisation/"

- term: "Assembly language"
  definition: "is a low-level programming language that uses mnemonics to represent machine code instructions. Each assembly instruction corresponds to a single machine code operation. An **assembler** translates assembly language into machine code."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "Assembly language"
  definition: "a low-level language that uses short mnemonic codes to represent individual machine code instructions. It requires an assembler to translate it into executable machine code."
  level: "GCSE"
  source: "/gcse/unit1/principles-of-programming/"

- term: "Assembly language"
  definition: "a low-level language where each instruction corresponds to a single machine code operation. It is specific to a particular type of CPU. **LMC (Little Man Computer)** — a simplified model of a computer used to teach assembly language. It has an accumulator, memory (mailboxes), an input tray and an output tray."
  level: "GCSE"
  source: "/gcse/unit2/programming-languages/"

- term: "Attribute"
  definition: "- a variable that belongs to an object, describing its properties (for example, `name`, `age`)."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "Attributes"
  definition: "(also called properties or fields) are the data items stored within an object. **Methods** are the functions defined within a class that operate on the object's attributes and define its behaviour."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "Authentication"
  definition: "the process of verifying a user's identity to confirm they are who they claim to be. This prevents unauthorised access to a system or its data."
  level: "GCSE"
  source: "/gcse/unit2/security-authentication/"

- term: "Backus-Naur Form (BNF)"
  definition: "is a formal notation for describing the syntax of a language using a set of production rules. Each rule defines how a non-terminal symbol can be replaced by a sequence of terminal and/or non-terminal symbols."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "Batch Processing"
  definition: "- Data is collected over a period of time and processed all at once as a single batch, without user interaction during processing."
  level: "AS"
  source: "/as/unit2/analysis-design/"

- term: "Big O notation"
  definition: "- a mathematical notation that describes the **upper bound** of an algorithm's growth rate as the input size increases. It classifies algorithms by how their time or space requirements scale, ignoring constants and lower-order terms. For example, O(n^2) means the time roughly quadruples when the input doubles."
  level: "A2"
  source: "/a2/unit3/algorithms-programs/"

- term: "Big O notation"
  definition: "is a mathematical notation used to describe the **upper bound** of an algorithm's time complexity or space complexity. It describes how the resource usage of an algorithm grows relative to the input size **n**, focusing on the **worst-case** scenario."
  level: "AS"
  source: "/as/unit1/algorithms-programs/"

- term: "Binary"
  definition: "base-2 number system using 0 and 1, the native language of computers. **Denary** — base-10 number system used by humans. **Hexadecimal** — base-16 number system using 0–9 and A–F, used as a compact representation of binary."
  level: "GCSE"
  source: "/gcse/unit1/data-organisation/"

- term: "Binary expression tree"
  definition: "- a binary tree that represents an arithmetic expression. Each **leaf node** contains an operand (number or variable), and each **internal node** contains an operator. The left and right children of an operator node are its operands (or sub-expressions)."
  level: "A2"
  source: "/a2/unit3/algorithms-programs/"

- term: "Binary search"
  definition: "is a search algorithm that works on **sorted** data by repeatedly dividing the search interval in half. It compares the target value to the middle element and eliminates half of the remaining elements at each step."
  level: "AS"
  source: "/as/unit1/algorithms-programs/"

- term: "Binary Search Tree (BST)"
  definition: "- a binary tree in which, for every node, all values in its left subtree are less than the node's value, and all values in its right subtree are greater than the node's value. This property enables efficient searching."
  level: "A2"
  source: "/a2/unit3/algorithms-programs/"

- term: "Binary tree"
  definition: "- a hierarchical data structure in which each node has at most two children, referred to as the left child and the right child. In a **binary search tree (BST)**, all values in the left subtree are less than the node, and all values in the right subtree are greater."
  level: "A2"
  source: "/a2/unit3/data-structures/"

- term: "bit"
  definition: "(binary digit) is the smallest unit of data, holding a value of either `0` or `1`. A **byte** is a group of 8 bits. A **word** is a fixed-size group of bits that the processor can handle as a single unit."
  level: "AS"
  source: "/as/unit1/data-representation/"

- term: "Bit masking"
  definition: "is the technique of using a logical operation (AND, OR, XOR) with a carefully chosen pattern of bits (the mask) to extract, set, toggle, or clear specific bits within a binary value."
  level: "AS"
  source: "/as/unit1/logical-operations/"

- term: "Bitmap (raster) image"
  definition: "an image made up of a grid of pixels, where each pixel stores colour data. **Vector image** — an image made up of mathematical objects defined by properties such as coordinates, fill, and stroke, allowing it to be scaled without loss of quality."
  level: "GCSE"
  source: "/gcse/unit1/data-organisation/"

- term: "Bluetooth"
  definition: "is a short-range wireless technology for exchanging data between devices over short distances using the 2.4 GHz ISM band. It is designed for low-power, low-cost personal area networks (PANs)."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "Boolean algebra"
  definition: "- a branch of algebra in which variables can only take the values 0 (false) or 1 (true), and the operations are AND (.), OR (+) and NOT (overbar). It provides a formal mathematical framework for simplifying logic circuits and expressions."
  level: "A2"
  source: "/a2/unit3/logical-operations/"

- term: "Bubble sort"
  definition: "is a simple sorting algorithm that repeatedly steps through the list, compares adjacent elements, and swaps them if they are in the wrong order. The largest unsorted value \"bubbles up\" to the end of the list on each pass."
  level: "AS"
  source: "/as/unit1/algorithms-programs/"

- term: "buffer"
  definition: "is a temporary storage area in memory used to hold data that is being transferred between two devices or processes that operate at different speeds."
  level: "AS"
  source: "/as/unit1/operating-system/"

- term: "Call stack"
  definition: "- a region of memory that stores information about active function calls. Each time a function is called, a new **stack frame** is pushed onto the call stack containing the function's local variables, parameters, and return address. When the function returns, its frame is popped off the stack."
  level: "A2"
  source: "/a2/unit3/algorithms-programs/"

- term: "Cellular networks"
  definition: "provide wide-area wireless connectivity through a network of base stations (cell towers). Each base station covers a geographical \"cell\", and devices are handed off between cells as they move."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "CISC (Complex Instruction Set Computer)"
  definition: "provides a large number of complex instructions, some of which can perform multi-step operations in a single instruction. Each instruction may take multiple clock cycles to execute."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "class"
  definition: "is a blueprint or template that defines the attributes (data) and methods (behaviour) that objects of that type will have. An **object** is a specific instance of a class, with its own values for the attributes defined by the class."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "class"
  definition: "is a blueprint or template that defines the attributes (data) and methods (behaviour) that objects of that type will have. An **object** is a specific instance of a class, with its own set of attribute values."
  level: "AS"
  source: "/as/unit1/principles-programming/"

- term: "Class"
  definition: "- a blueprint or template that defines the attributes (data) and methods (actions) that an object will have."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "Class"
  definition: "a template that defines the properties (data) and methods (behaviour) that objects of that type will have."
  level: "GCSE"
  source: "/gcse/unit2/programming-languages/"

- term: "Clearing"
  definition: "- setting specific bits in a binary word to 0 while leaving other bits unchanged. This is achieved by ANDing the word with a pattern that has 0s in the positions to clear and 1s elsewhere."
  level: "A2"
  source: "/a2/unit3/logical-operations/"

- term: "Cloud-based software"
  definition: "(Software as a Service, SaaS) is hosted on remote servers and accessed via the internet. **Locally installed software** is installed directly on the user's device and runs using local hardware resources."
  level: "AS"
  source: "/as/unit1/choosing-software/"

- term: "co-processor"
  definition: "is a supplementary processor designed to handle specific types of computation, offloading work from the main CPU to improve overall system performance."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "code of conduct"
  definition: "is a formal document that outlines the ethical principles, professional standards, and behavioural expectations that members of a professional body agree to follow. It serves as a framework for making ethical decisions in the workplace."
  level: "A2"
  source: "/a2/unit3/ethical-issues/"

- term: "collision"
  definition: "occurs when two devices transmit data simultaneously on a shared medium, causing the signals to interfere. **CSMA/CD** detects collisions on wired networks. **CSMA/CA** avoids collisions on wireless networks."
  level: "AS"
  source: "/as/unit1/data-transmission/"

- term: "Command and control"
  definition: "voice systems recognise a limited set of short, predefined spoken commands to control a device or application. They use a restricted vocabulary matched against stored templates."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "compiler"
  definition: "translates the entire source code into an executable before the program runs. An **interpreter** translates and executes one line at a time during runtime. An **assembler** translates assembly language (low-level) into machine code."
  level: "AS"
  source: "/as/unit1/principles-programming/"

- term: "constant"
  definition: "is a named data item whose value is fixed at the time of declaration and cannot be changed during program execution. Constants improve readability, maintainability, and reduce errors."
  level: "AS"
  source: "/as/unit1/program-design/"

- term: "Constant"
  definition: "- A named storage location whose value is set once and cannot be changed during program execution."
  level: "AS"
  source: "/as/unit2/programming-skills/"

- term: "Constant"
  definition: "- A named storage location in memory whose value is fixed at the start and cannot change during program execution."
  level: "GCSE"
  source: "/gcse/unit2/data-structures-types/"

- term: "Cookie"
  definition: "a small text file stored on a user's computer by a website. It contains data that the website can read the next time the user visits."
  level: "GCSE"
  source: "/gcse/unit1/security-data-management/"

- term: "Copyright"
  definition: "is the legal right of the creator of an original work to control how it is used, copied, and distributed. Under UK law, it applies automatically to software, music, text, images, and other creative works."
  level: "AS"
  source: "/as/unit1/ethical-legal-issues/"

- term: "Count"
  definition: "- a variable used to keep track of how many times something has happened, such as how many numbers have been entered."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "Cryptography"
  definition: "is the science of securing information by transforming it into an unreadable format (**ciphertext**) that can only be converted back to readable form (**plaintext**) by someone with the correct key. **Encryption** is the process of converting plaintext to ciphertext; **decryption** is the reverse."
  level: "A2"
  source: "/a2/unit4/data-security/"

- term: "DAT"
  definition: "used at the end of an LMC program to reserve named memory locations. `DAT` on its own reserves empty space; `DAT 1` reserves space and sets the initial value to 1."
  level: "GCSE"
  source: "/gcse/unit2/programming-languages/"

- term: "Data consistency"
  definition: "means that all copies and representations of a data item agree with each other. If a customer's address is stored in multiple places, every instance must hold the same value at any given time."
  level: "A2"
  source: "/a2/unit4/databases-distributed/"

- term: "data dependency"
  definition: "occurs when an instruction requires the result of a previous instruction before it can execute. Data dependencies force sequential execution and prevent parallelisation of those instructions."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "data dictionary"
  definition: "(also called the system catalogue) contains metadata about every object in the database: table names, field names, data types, constraints, relationships, indexes, and user access rights. It is maintained automatically by the DBMS."
  level: "A2"
  source: "/a2/unit4/databases-distributed/"

- term: "data dictionary"
  definition: "stores metadata about the database structure, including table names, field names, data types, constraints, relationships, and access rights."
  level: "AS"
  source: "/as/unit1/database-systems/"

- term: "Data Flow Diagram (DFD)"
  definition: "is a graphical tool that shows the flow of data through a system, including its sources, destinations, processes, and storage. A **context diagram** is the highest-level DFD showing the whole system as one process."
  level: "AS"
  source: "/as/unit1/software-design/"

- term: "Data independence"
  definition: "is the ability to change the way data is stored or organised without affecting the programs that use it."
  level: "A2"
  source: "/a2/unit4/databases-distributed/"

- term: "Data mining"
  definition: "is the process of discovering patterns, correlations, and anomalies in large datasets using statistical and computational techniques to make predictions or gain insights."
  level: "A2"
  source: "/a2/unit4/databases-distributed/"

- term: "Data Protection Act 2018"
  definition: "the main UK law governing how personal data must be handled. It gives individuals rights over their data and imposes obligations on organisations that process it. **Computer Misuse Act 1990** — the law that makes hacking and unauthorised access to computer systems a criminal offence."
  level: "GCSE"
  source: "/gcse/unit1/ethical-legal-environmental/"

- term: "Data redundancy"
  definition: "is the unnecessary duplication of data. In a flat-file system, the same information (e.g. a customer name and address) may be stored in the orders file, the invoices file, and the accounts file."
  level: "A2"
  source: "/a2/unit4/databases-distributed/"

- term: "Data skew"
  definition: "occurs in parallel transmission when bits travelling on different wires arrive at slightly different times due to minor differences in wire length or electrical properties. This limits parallel transmission to short distances."
  level: "AS"
  source: "/as/unit1/data-transmission/"

- term: "data type"
  definition: "specifies the kind of value a variable can store and the operations that can be performed on it. The five core data types at AS level are: **integer**, **real** (float/double), **Boolean**, **character**, and **string**."
  level: "AS"
  source: "/as/unit1/program-design/"

- term: "Data type"
  definition: "- Defines what kind of data a variable can hold and what operations can be performed on it."
  level: "AS"
  source: "/as/unit2/programming-skills/"

- term: "Data type"
  definition: "- Defines what kind of value a variable holds and determines what operations can be performed on it."
  level: "GCSE"
  source: "/gcse/unit2/data-structures-types/"

- term: "data warehouse"
  definition: "is a large, centralised repository that stores historical data from multiple operational sources, organised specifically for analysis and reporting rather than day-to-day transaction processing."
  level: "A2"
  source: "/a2/unit4/databases-distributed/"

- term: "DBMS"
  definition: "is software that manages access to a database, providing data definition, data manipulation, security, and integrity features while hiding the physical storage details from users."
  level: "AS"
  source: "/as/unit1/database-systems/"

- term: "De Morgan's Laws"
  definition: "- two transformation rules that relate AND and OR operations through complementation: - **First law:** <span style=\"text-decoration:overline\">A . B</span> = A&#x0304; + B&#x0304; (the complement of AND equals OR of complements) - **Second law:** <span style=\"text-decoration:overline\">A + B</span> = A&#x0304; . B&#x0304; (the complement of OR equals AND of complements) In words: \"break the bar, change the sign.\""
  level: "A2"
  source: "/a2/unit3/logical-operations/"

- term: "De Morgan's Laws"
  definition: "state that the complement of a conjunction (AND) is the disjunction (OR) of the complements, and vice versa. In simpler terms: \"break the bar, change the sign.\""
  level: "AS"
  source: "/as/unit1/logical-operations/"

- term: "De Morgan's Laws"
  definition: "rules that describe how NOT distributes over AND and OR. They are essential for simplifying Boolean expressions: NOT (A AND B) = (NOT A) OR (NOT B), and NOT (A OR B) = (NOT A) AND (NOT B)."
  level: "GCSE"
  source: "/gcse/unit1/logical-operations/"

- term: "Debugging"
  definition: "the process of finding, diagnosing and fixing errors (bugs) in a program. IDEs support debugging through tools such as breakpoints, stepping, watch windows and error messages."
  level: "GCSE"
  source: "/gcse/unit1/software-engineering/"

- term: "Declarative programming"
  definition: "specifies the desired result without explicitly listing the step-by-step commands needed to achieve it. **Logic programming** uses facts and rules to answer queries through logical inference."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "Decomposition"
  definition: "is the process of breaking a large problem down into smaller sub-problems that are easier to understand, solve, and test individually."
  level: "GCSE"
  source: "/gcse/unit2/problem-solving/"

- term: "Design validation"
  definition: "is the process of reviewing a system design to confirm it correctly and completely addresses the requirements specification. It answers the question: \"Are we building the right system?\""
  level: "A2"
  source: "/a2/unit3/system-design/"

- term: "device driver"
  definition: "is software that translates generic OS commands into specific instructions that a particular hardware device can understand and execute."
  level: "AS"
  source: "/as/unit1/operating-system/"

- term: "Device driver"
  definition: "a program that allows the operating system to communicate with a specific hardware device. Each device needs its own driver so the OS can send it the correct instructions."
  level: "GCSE"
  source: "/gcse/unit1/system-software/"

- term: "digital divide"
  definition: "is the gap between those who have access to modern information and communication technology (computers, the internet, digital skills) and those who do not. It exists between countries (global divide), within countries (social divide), and between generations (generational divide)."
  level: "AS"
  source: "/as/unit1/ethical-legal-issues/"

- term: "Disk partitioner"
  definition: "a utility that divides a physical storage device into separate logical sections (partitions). Each partition is treated as an independent drive by the operating system."
  level: "GCSE"
  source: "/gcse/unit1/system-software/"

- term: "distributed database"
  definition: "is a database where the data is stored across multiple computers (nodes) at different physical locations, but appears to users as a single, unified database."
  level: "A2"
  source: "/a2/unit4/databases-distributed/"

- term: "DRY (Don't Repeat Yourself)"
  definition: "- A principle of software development that states every piece of knowledge or logic should have a single, unambiguous representation in the code. If you find yourself copying and pasting code, you should probably extract it into a subroutine."
  level: "AS"
  source: "/as/unit2/code-quality/"

- term: "Dry running"
  definition: "(desk checking) is manually working through a program on paper, line by line, to verify that it produces the correct output. A **trace table** is a tabular record of variable values at each step of execution."
  level: "AS"
  source: "/as/unit1/software-testing/"

- term: "Elegance"
  definition: "in programming refers to a solution that is concise, clear, and closely mirrors the mathematical or logical definition of the problem. Recursive solutions are often considered elegant because they express the problem in terms of itself."
  level: "A2"
  source: "/a2/unit3/algorithms-programs/"

- term: "embedded system"
  definition: "is a computer system built into a larger device to perform a **dedicated function**. It is not a general-purpose computer — it is designed for one specific task."
  level: "GCSE"
  source: "/gcse/unit1/hardware/"

- term: "Encapsulation"
  definition: "is the bundling of data (attributes) and the methods that operate on that data into a single unit (class), while restricting direct access to the internal state. External code interacts with the object only through its public methods."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "Encapsulation"
  definition: "is the principle of bundling data (attributes) and the methods that operate on that data into a single unit (a class), and restricting direct access to some of the object's components. This is achieved through **access modifiers** (public, private, protected)."
  level: "AS"
  source: "/as/unit1/principles-programming/"

- term: "Encapsulation"
  definition: "the process of wrapping data with protocol headers as it moves down through the layers. Each layer adds its own control information. **De-encapsulation** is the reverse process at the receiving end."
  level: "GCSE"
  source: "/gcse/unit1/communication/"

- term: "Encapsulation"
  definition: "the principle of keeping an object's data **private** and only allowing access through **public methods** (getters and setters). This protects the data from being changed in unexpected ways."
  level: "GCSE"
  source: "/gcse/unit2/programming-languages/"

- term: "Encryption"
  definition: "the process of converting plain text into an unreadable format (cipher text) using an algorithm and a key. Only someone with the correct key can decrypt the data back to its original form."
  level: "GCSE"
  source: "/gcse/unit1/security-data-management/"

- term: "entity"
  definition: "is a real-world object or concept about which data is stored (e.g., Student, Course, Teacher). A **relationship** describes how entities are associated with each other."
  level: "AS"
  source: "/as/unit1/database-systems/"

- term: "Entity"
  definition: "- A thing or object in the real world that we want to store data about (e.g. Student, Course, Teacher). Entities are drawn as rectangles."
  level: "AS"
  source: "/as/unit2/analysis-design/"

- term: "Entity-Relationship Diagram (ERD)"
  definition: "models the data entities in a system and the relationships between them. A **primary key** uniquely identifies each record in an entity. A **foreign key** is an attribute in one entity that references the primary key of another entity."
  level: "AS"
  source: "/as/unit1/software-design/"

- term: "Error handling"
  definition: "- The process of anticipating, detecting, and responding to errors that occur during program execution, preventing the program from crashing."
  level: "AS"
  source: "/as/unit2/programming-skills/"

- term: "Ethernet"
  definition: "the most common wired networking standard, using copper or fibre optic cables. **Wi-Fi** — a wireless networking standard that uses radio waves to connect devices to a network."
  level: "GCSE"
  source: "/gcse/unit1/communication/"

- term: "Ethics"
  definition: "in computing refers to the moral principles that govern the design, development, and use of technology. Unlike laws, ethical standards are not legally enforceable, but they guide responsible behaviour in areas where legislation may be absent or insufficient."
  level: "AS"
  source: "/as/unit1/ethical-legal-issues/"

- term: "Ethics"
  definition: "a set of moral principles that govern what is considered right and wrong behaviour. In computing, ethical issues arise when technology affects people's rights, privacy, safety, or wellbeing."
  level: "GCSE"
  source: "/gcse/unit1/ethical-legal-environmental/"

- term: "expert system"
  definition: "uses a **knowledge base** of facts and rules, combined with an **inference engine**, to draw conclusions and provide advice in a specialised domain. It aims to replicate the reasoning of a human expert."
  level: "A2"
  source: "/a2/unit4/software-systems/"

- term: "feasibility study"
  definition: "is an investigation carried out early in the SDLC to determine whether a proposed project is viable and worth pursuing. It examines the project from multiple perspectives before significant resources are committed."
  level: "AS"
  source: "/as/unit1/systems-analysis/"

- term: "fetch-decode-execute cycle"
  definition: "is the continuous process by which the CPU fetches an instruction from memory, decodes it to understand what operation is required, and then executes the operation."
  level: "AS"
  source: "/as/unit1/hardware-communication/"

- term: "Field:"
  definition: "A single item of data (e.g., a surname, a date of birth). **Record:** A collection of related fields describing one entity (e.g., one student). **File:** A collection of related records (e.g., all students in a school)."
  level: "AS"
  source: "/as/unit1/organisation-of-data/"

- term: "Firewall"
  definition: "a security utility that monitors network traffic and blocks unauthorised access based on a set of predefined rules. It acts as a barrier between a trusted internal network and untrusted external networks such as the internet."
  level: "GCSE"
  source: "/gcse/unit1/system-software/"

- term: "First Normal Form (1NF):"
  definition: "A relation is in 1NF if it contains no repeating groups and every field contains only **atomic** (indivisible) values. Each row must be uniquely identifiable."
  level: "A2"
  source: "/a2/unit4/databases-distributed/"

- term: "Fixed-length records"
  definition: "allocate the same amount of space for every record, allowing direct calculation of record positions. **Variable-length records** use only the space needed, separated by delimiters."
  level: "AS"
  source: "/as/unit1/organisation-of-data/"

- term: "flat file database"
  definition: "stores all data in one table, leading to redundancy and anomalies. A **relational database** stores data in multiple linked tables, reducing redundancy and improving data integrity."
  level: "AS"
  source: "/as/unit1/database-systems/"

- term: "Floating point representation"
  definition: "stores real numbers (numbers with fractional parts) using two components: the **mantissa** (which holds the significant digits of the number) and the **exponent** (which determines the position of the binary point). This is analogous to scientific notation in denary."
  level: "A2"
  source: "/a2/unit4/data-representation/"

- term: "Floating point representation"
  definition: "stores a real number as a **mantissa** (the significant digits) and an **exponent** (the power of 2), allowing both very large and very small numbers to be represented. **Normalisation** ensures the mantissa starts with `01` (positive) or `10` (negative) to maximise precision."
  level: "AS"
  source: "/as/unit1/data-representation/"

- term: "flowchart"
  definition: "is a visual representation of an algorithm using standard symbols (terminators, processes, decisions, input/output) connected by arrows to show the flow of control."
  level: "AS"
  source: "/as/unit1/software-design/"

- term: "Flowchart"
  definition: "is a diagram that uses standard shapes to represent the steps in an algorithm. Each shape has a specific meaning."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "Foreign Key"
  definition: "- A field in one entity that references the primary key of another entity, establishing a link between them. For example, AuthorID in the Book table references AuthorID in the Author table."
  level: "AS"
  source: "/as/unit2/analysis-design/"

- term: "function"
  definition: "is a subroutine that returns a value. A **procedure** (called a `Sub` in VB.NET) is a subroutine that performs an action but does not return a value."
  level: "AS"
  source: "/as/unit1/program-design/"

- term: "Functional programming** is a paradigm where programs are constructed by applying and composing **pure functions"
  definition: "- functions that always produce the same output for the same input and have no side effects."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "Functionality"
  definition: "measures whether the system does what it is supposed to do -- whether it correctly implements all the features specified in the requirements."
  level: "A2"
  source: "/a2/unit3/system-design/"

- term: "GDPR (General Data Protection Regulation)"
  definition: "is a comprehensive data protection framework that gives individuals control over their personal data and requires organisations to handle that data lawfully, transparently, and securely. In the UK, it is implemented through the **Data Protection Act 2018**."
  level: "AS"
  source: "/as/unit1/ethical-legal-issues/"

- term: "Global variable"
  definition: "- A variable declared outside all subroutines, at the top level of the program. It can be accessed from anywhere in the program."
  level: "AS"
  source: "/as/unit2/programming-skills/"

- term: "Global variable"
  definition: "- a variable declared outside all sub routines, usually at the top of the program. It can be accessed from anywhere in the program."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "GPU (Graphics Processing Unit) computing"
  definition: "uses the massively parallel architecture of a graphics card for general-purpose computation. GPUs contain thousands of small, simple cores optimised for performing the same operation on many data points simultaneously."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "Handshaking"
  definition: "is the exchange of control signals between two devices to establish the rules and parameters of a communication session before any data is transmitted."
  level: "AS"
  source: "/as/unit1/hardware-communication/"

- term: "Hardware"
  definition: "refers to the physical, tangible components of a computer system -- the parts you can touch. **Software** refers to the programs and data that instruct the hardware what to do."
  level: "AS"
  source: "/as/unit1/hardware-communication/"

- term: "Harvard Architecture"
  definition: "uses physically separate memory stores and buses for instructions and data, allowing both to be fetched simultaneously. This removes the Von Neumann bottleneck and increases throughput."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "Hash table"
  definition: "- a data structure that maps keys to values using a **hash function**. The hash function converts a key into an array index, allowing average-case O(1) insertion, deletion, and lookup. When two different keys produce the same index, a **collision** occurs and must be resolved."
  level: "A2"
  source: "/a2/unit3/data-structures/"

- term: "hash table"
  definition: "uses a **hash function** to map a key to an index in an array, allowing near-instant data retrieval. A **collision** occurs when two different keys produce the same hash value."
  level: "AS"
  source: "/as/unit1/data-structures/"

- term: "hashing algorithm"
  definition: "is a function that takes a key value as input and produces a storage address as output. The same key always produces the same address (deterministic)."
  level: "A2"
  source: "/a2/unit4/organisation-data/"

- term: "Hexadecimal"
  definition: "is a base-16 number system using digits 0-9 and letters A-F. It provides a compact, human-readable way to represent binary data, where each hexadecimal digit corresponds to exactly 4 binary bits."
  level: "AS"
  source: "/as/unit1/data-representation/"

- term: "High-level language"
  definition: "a programming language that uses English-like syntax and abstracts away hardware details. It must be translated into machine code before execution."
  level: "GCSE"
  source: "/gcse/unit1/principles-of-programming/"

- term: "Homophones"
  definition: "are words that sound identical when spoken but have different meanings and often different spellings."
  level: "A2"
  source: "/a2/unit3/system-design/"

- term: "HTML"
  definition: "a markup language used to structure content on web pages. Browsers read HTML files and render them as formatted pages."
  level: "GCSE"
  source: "/gcse/unit2/programming-languages/"

- term: "Hub"
  definition: "broadcasts data to all connected devices. **Switch** — sends data only to the intended device using MAC addresses. **Router** — directs packets between networks using IP addresses. **Bridge** — connects two network segments. **WAP** — allows wireless devices to join a wired network. **NIC** — hardware in a device that enables network connectivity, identified by a unique MAC address."
  level: "GCSE"
  source: "/gcse/unit1/communication/"

- term: "Human-Computer Interaction (HCI)"
  definition: "is the study and design of how people interact with computers. It focuses on making interfaces that are effective, efficient, and satisfying for users."
  level: "A2"
  source: "/a2/unit3/system-design/"

- term: "IDE (Integrated Development Environment)"
  definition: "a software package that combines a code editor, translator, debugging tools and other features into a single application to support program development. Examples include Visual Studio, PyCharm, IDLE, Thonny and Replit."
  level: "GCSE"
  source: "/gcse/unit1/software-engineering/"

- term: "index"
  definition: "is an ordered list of key values paired with the physical addresses of the corresponding records in the data file. It works like the index at the back of a textbook — you look up a term to find the page number."
  level: "A2"
  source: "/a2/unit4/organisation-data/"

- term: "Indexed sequential access"
  definition: "stores records in key order with an **index** that enables fast lookup by pointing to the approximate location of a record, reducing the number of records that must be searched."
  level: "AS"
  source: "/as/unit1/organisation-of-data/"

- term: "Inheritance"
  definition: "allows a new class (subclass or child class) to be based on an existing class (superclass or parent class), inheriting its attributes and methods. The subclass can add new attributes/methods or override existing ones."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "Inheritance"
  definition: "allows a new class (the **child** or **subclass**) to inherit attributes and methods from an existing class (the **parent** or **superclass**). The child class can extend or override the inherited behaviour."
  level: "AS"
  source: "/as/unit1/principles-programming/"

- term: "Inheritance"
  definition: "when a **subclass** (child class) inherits all the properties and methods of a **superclass** (parent class). The subclass can add new behaviour or override existing behaviour."
  level: "GCSE"
  source: "/gcse/unit2/programming-languages/"

- term: "Insertion sort"
  definition: "builds the sorted list one element at a time. It takes each element from the unsorted portion and inserts it into its correct position within the sorted portion, shifting elements as necessary."
  level: "AS"
  source: "/as/unit1/algorithms-programs/"

- term: "Integrated Development Environment (IDE)"
  definition: "is a software application that provides a comprehensive set of tools for software development within a single interface. Examples include Visual Studio, PyCharm, Eclipse, and VS Code."
  level: "AS"
  source: "/as/unit1/principles-programming/"

- term: "Integrated Development Environment (IDE)"
  definition: "a software application that provides a comprehensive set of tools for writing, testing, and debugging programs, all within a single interface. Examples include Visual Studio, PyCharm, IDLE, and Eclipse."
  level: "GCSE"
  source: "/gcse/unit1/program-construction/"

- term: "Interactive Processing"
  definition: "- The user interacts with the system and receives immediate responses. Processing occurs in direct response to user input."
  level: "AS"
  source: "/as/unit2/analysis-design/"

- term: "interface"
  definition: "is the way that different modules communicate with each other. In practice, this means the **parameters** a function accepts and the **value** it returns."
  level: "GCSE"
  source: "/gcse/unit2/problem-solving/"

- term: "Internet"
  definition: "is a worldwide collection of interconnected computer networks that communicate using the TCP/IP protocol suite. It is not a single network but a **network of networks**."
  level: "A2"
  source: "/a2/unit4/data-transmission/"

- term: "Internet"
  definition: "is a global interconnected network of networks that uses TCP/IP to communicate. The **World Wide Web (WWW)** is a service that runs on top of the Internet, using HTTP to deliver web pages -- it is NOT the same as the Internet."
  level: "AS"
  source: "/as/unit1/hardware-communication/"

- term: "interrupt"
  definition: "is a signal that temporarily halts the current process so the CPU can handle a higher-priority event. An **Interrupt Service Routine (ISR)** is the special routine that handles a specific type of interrupt."
  level: "AS"
  source: "/as/unit1/operating-system/"

- term: "Interrupt Service Routine (ISR)"
  definition: "is a special routine stored in memory that handles a specific type of interrupt. The **interrupt vector table** maps each interrupt type to the memory address of its ISR."
  level: "A2"
  source: "/a2/unit4/operating-system/"

- term: "IP address"
  definition: "a unique numerical address assigned to every device on a network, used to identify the device and route data to it. IPv4 uses 32 bits; IPv6 uses 128 bits."
  level: "GCSE"
  source: "/gcse/unit1/communication/"

- term: "Iteration"
  definition: "- a section of code is repeated. This can be a fixed number of times (count-controlled) or until a condition is met (condition-controlled)."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "LAN"
  definition: "a network confined to a small area, owned and managed by one organisation. **WAN** — a network spanning a large area, often using infrastructure from telecommunications providers. **PAN** — a very small network connecting personal devices, typically using Bluetooth. **MAN** — a network spanning a city, connecting multiple LANs. **VPN** — a secure, encrypted connection over a public network that allows private data to be sent safely."
  level: "GCSE"
  source: "/gcse/unit1/communication/"

- term: "Lexical ambiguity"
  definition: "occurs when a single word has more than one meaning. The correct meaning depends on context."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "Library"
  definition: "a collection of pre-written code modules that provide commonly needed functionality (e.g. mathematical operations, file handling, graphics). Programmers can import and use library code in their own programs rather than writing everything from scratch."
  level: "GCSE"
  source: "/gcse/unit1/program-construction/"

- term: "Linear search"
  definition: "(also called sequential search) is an algorithm that checks every element in a list, one by one, from the beginning until the target value is found or the end of the list is reached."
  level: "AS"
  source: "/as/unit1/algorithms-programs/"

- term: "Linked list"
  definition: "- a dynamic data structure made up of nodes, where each node contains a data field and a pointer (link) to the next node in the sequence. Unlike arrays, linked list elements are not stored contiguously -- they are connected logically through pointers."
  level: "A2"
  source: "/a2/unit3/data-structures/"

- term: "linked list"
  definition: "is a dynamic data structure where each **node** contains a data value and a pointer to the next node. A **head pointer** indicates the start of the list."
  level: "AS"
  source: "/as/unit1/data-structures/"

- term: "linker"
  definition: "combines one or more object code files (produced by the compiler) with any required **library** code into a single executable file. It resolves references between separately compiled modules."
  level: "AS"
  source: "/as/unit1/principles-programming/"

- term: "Linker"
  definition: "a tool that combines the compiled object code of a program with the object code of any library modules it uses, producing a single standalone executable file."
  level: "GCSE"
  source: "/gcse/unit1/program-construction/"

- term: "Little Man Computer (LMC)"
  definition: "is an instructional model of a simple computer. It has a limited instruction set, a single accumulator register, an input tray, an output tray, and 100 mailboxes (memory locations numbered 00–99)."
  level: "GCSE"
  source: "/gcse/unit1/principles-of-programming/"

- term: "Load factor"
  definition: "- the ratio of the number of items stored to the total number of slots in the hash table: `load factor = n / table_size`. A higher load factor increases the likelihood of collisions. For open addressing, performance degrades sharply above a load factor of around 0.7. Tables are often resized when the load factor exceeds a threshold."
  level: "A2"
  source: "/a2/unit3/data-structures/"

- term: "loader"
  definition: "is a part of the operating system that loads an executable file from secondary storage into **main memory (RAM)** and prepares it for execution by the CPU."
  level: "AS"
  source: "/as/unit1/principles-programming/"

- term: "Loader"
  definition: "a component of the operating system that loads the executable file from secondary storage into main memory (RAM) so that the CPU can execute it."
  level: "GCSE"
  source: "/gcse/unit1/program-construction/"

- term: "local variable"
  definition: "is declared inside a subroutine and is only accessible within that subroutine. A **global variable** is declared outside all subroutines and is accessible throughout the entire program. Best practice is to use local variables wherever possible and pass data between subroutines using parameters."
  level: "AS"
  source: "/as/unit1/program-design/"

- term: "Local variable"
  definition: "- A variable declared inside a subroutine. It can only be accessed within that subroutine and exists only while the subroutine is executing."
  level: "AS"
  source: "/as/unit2/programming-skills/"

- term: "Local variable"
  definition: "- a variable declared inside a sub routine. It can only be used within that sub routine and is destroyed when the sub routine ends."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "Logic gate"
  definition: "- a digital circuit that performs a Boolean function on one or more binary inputs to produce a single binary output. The behaviour of every gate is completely defined by its truth table."
  level: "A2"
  source: "/a2/unit3/logical-operations/"

- term: "Logic gate"
  definition: "an electronic circuit that performs a logical operation on one or more binary inputs to produce a single binary output. The four gates at GCSE are AND, OR, NOT, and XOR."
  level: "GCSE"
  source: "/gcse/unit1/logical-operations/"

- term: "Logical shift left"
  definition: "moves all bits to the left by the specified number of positions. Vacated positions on the right are filled with **0s**. Bits shifted out of the left end are lost. Each shift left **multiplies** the value by 2."
  level: "A2"
  source: "/a2/unit4/data-representation/"

- term: "Logical shift right"
  definition: "moves all bits to the right by the specified number of positions. Vacated positions on the left are filled with **0s**. Bits shifted out of the right end are lost. Each shift right **divides** the value by 2 (integer division, truncating any remainder)."
  level: "A2"
  source: "/a2/unit4/data-representation/"

- term: "Lookup table"
  definition: "a validation technique that compares input against a predefined list of acceptable values, often presented as a dropdown menu. **Check digit** — an extra digit calculated from other digits using an algorithm, appended to a code (such as a barcode or ISBN) to detect data entry or transmission errors."
  level: "GCSE"
  source: "/gcse/unit1/data-organisation/"

- term: "Lossless compression"
  definition: "reduces file size while allowing the original data to be perfectly reconstructed. **Lossy compression** achieves greater size reduction by permanently removing some data, meaning the original cannot be fully restored."
  level: "AS"
  source: "/as/unit1/algorithms-programs/"

- term: "Malware"
  definition: "malicious software designed to damage, disrupt, or gain unauthorised access to a computer system. It is a general term covering all types of harmful programs."
  level: "GCSE"
  source: "/gcse/unit1/security-data-management/"

- term: "Masking"
  definition: "- using a bitwise operation to extract or isolate certain bits from a binary word. AND masking selects bits (keeps them visible), while OR masking can force bits to 1."
  level: "A2"
  source: "/a2/unit3/logical-operations/"

- term: "master file"
  definition: "is a permanent file containing the current state of data (e.g. customer accounts). A **transaction file** is a temporary file containing recent changes (additions, deletions, amendments) to be applied to the master file."
  level: "A2"
  source: "/a2/unit4/organisation-data/"

- term: "Master file"
  definition: "the main, permanent data store that holds the current state of all records. It is updated periodically but is not changed during daily operations. Examples include a payroll file, customer database, or stock file."
  level: "AS"
  source: "/as/unit1/organisation-of-data/"

- term: "Merge sort"
  definition: "- a divide-and-conquer sorting algorithm that recursively splits a list in half, sorts each half, and then merges the two sorted halves back together. It is a **stable** sort with a guaranteed time complexity of **O(n log n)** in all cases."
  level: "A2"
  source: "/a2/unit3/algorithms-programs/"

- term: "Merge sort"
  definition: "is a **divide and conquer** sorting algorithm. It recursively splits the list into halves until each sub-list contains a single element, then merges the sub-lists back together in sorted order."
  level: "AS"
  source: "/as/unit1/algorithms-programs/"

- term: "Method"
  definition: "- a sub routine that belongs to a class. It defines the behaviour of the object."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "Method"
  definition: "a named block of code that belongs to a class. Methods define what an object can *do*."
  level: "GCSE"
  source: "/gcse/unit2/programming-languages/"

- term: "Modular programming"
  definition: "is a design approach where a program is divided into independent, interchangeable modules, each handling a specific piece of functionality."
  level: "GCSE"
  source: "/gcse/unit2/problem-solving/"

- term: "multi-core processor"
  definition: "contains two or more independent processing units (cores) on a single chip. Each core can fetch, decode, and execute instructions independently, allowing genuine parallel execution of multiple threads or processes."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "Multiplexing"
  definition: "is the process of combining multiple signals over a single shared communication channel. A **multiplexer (MUX)** combines the signals at the sending end, and a **demultiplexer (DEMUX)** separates them at the receiving end."
  level: "AS"
  source: "/as/unit1/data-transmission/"

- term: "natural language interface"
  definition: "allows users to interact with a computer using everyday human language (spoken or typed) rather than a formal command syntax or graphical controls."
  level: "A2"
  source: "/a2/unit3/system-design/"

- term: "network topology"
  definition: "describes the physical or logical arrangement of devices in a network. The choice of topology affects performance, fault tolerance, and cost."
  level: "AS"
  source: "/as/unit1/hardware-communication/"

- term: "NFC (Near Field Communication)"
  definition: "is a very short-range wireless technology (up to approximately 10 cm) based on RFID. It enables simple, touch-based communication between devices."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "Normalisation"
  definition: "is the process of adjusting the mantissa and exponent so that the mantissa uses all available bits to store significant digits, thereby maximising the precision of the representation."
  level: "A2"
  source: "/a2/unit4/data-representation/"

- term: "Normalisation"
  definition: "is a systematic process of decomposing tables to eliminate data redundancy and dependency anomalies, progressing through First Normal Form (1NF), Second Normal Form (2NF), and Third Normal Form (3NF)."
  level: "AS"
  source: "/as/unit1/database-systems/"

- term: "Object"
  definition: "- an instance of a class. You can create many objects from one class."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "Object"
  definition: "a specific instance created from a class. For example, if `Crab` is the class, then a particular crab on screen is an object."
  level: "GCSE"
  source: "/gcse/unit2/programming-languages/"

- term: "Open source software"
  definition: "provides access to its source code, allowing users to view, modify, and distribute it. **Proprietary software** keeps its source code secret and requires users to purchase a licence for use."
  level: "AS"
  source: "/as/unit1/choosing-software/"

- term: "Operating System"
  definition: "is system software that manages computer hardware resources, provides common services for application programs, and acts as an interface between the user and the hardware."
  level: "AS"
  source: "/as/unit1/operating-system/"

- term: "Operating System (OS)"
  definition: "system software that manages hardware resources, provides a user interface, and allows application software to run. Examples include Windows, macOS, Linux, iOS and Android."
  level: "GCSE"
  source: "/gcse/unit1/system-software/"

- term: "Overflow"
  definition: "occurs when the result of an arithmetic operation is too large (positive) or too small (negative) to be represented in the available number of bits."
  level: "A2"
  source: "/a2/unit4/data-representation/"

- term: "Overflow"
  definition: "an error that occurs when the result of an arithmetic operation exceeds the maximum value that can be stored in the available number of bits. The result wraps around and becomes incorrect."
  level: "GCSE"
  source: "/gcse/unit1/data-organisation/"

- term: "packet"
  definition: "is a formatted unit of data containing a header (with addressing and control information), a payload (the actual data), and sometimes a trailer (for error checking). Packets are the fundamental unit of data transmission on TCP/IP networks."
  level: "AS"
  source: "/as/unit1/data-transmission/"

- term: "Parallel processing"
  definition: "is the simultaneous execution of multiple instructions or tasks by dividing a problem into parts that can be solved concurrently across multiple processors or cores."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "Parallel processing"
  definition: "is the simultaneous execution of multiple instructions or tasks. It can be achieved through pipelining, multiple cores, multiple processors, or GPU computing."
  level: "AS"
  source: "/as/unit1/hardware-communication/"

- term: "Parameter"
  definition: "- A variable listed in a subroutine's definition that receives a value when the subroutine is called."
  level: "AS"
  source: "/as/unit2/programming-skills/"

- term: "Parameter passing by value"
  definition: "a **copy** of the data is sent to the method. Changes inside the method do **not** affect the original variable. **Parameter passing by reference** — a **reference (address)** to the original data is sent. Changes inside the method **do** affect the original data."
  level: "GCSE"
  source: "/gcse/unit2/programming-languages/"

- term: "Personal data"
  definition: "any information that can be used to identify a living individual, such as name, address, date of birth, email address, medical records, or financial details."
  level: "GCSE"
  source: "/gcse/unit1/security-data-management/"

- term: "Polling"
  definition: "is a technique where the CPU repeatedly checks (polls) each I/O device in turn to see if it needs attention or has data ready."
  level: "AS"
  source: "/as/unit1/operating-system/"

- term: "Polymorphism"
  definition: "(meaning \"many forms\") allows objects of different classes to be treated through the same interface. A method call on a variable can produce different behaviour depending on the actual type of the object at runtime."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "Polymorphism"
  definition: "(meaning \"many forms\") allows objects of different classes to be treated through the same interface. The same method name can behave differently depending on which class the object belongs to."
  level: "AS"
  source: "/as/unit1/principles-programming/"

- term: "Portability"
  definition: "the ability of source code to be run on different types of hardware or operating systems without modification. High-level languages are portable; low-level languages are not."
  level: "GCSE"
  source: "/gcse/unit1/principles-of-programming/"

- term: "Postfix evaluation"
  definition: "- the process of computing the result of a postfix expression using a stack. Operands are pushed onto the stack; when an operator is encountered, the required number of operands are popped, the operation is applied, and the result is pushed back."
  level: "A2"
  source: "/a2/unit3/algorithms-programs/"

- term: "Predictive analytics"
  definition: "uses statistical techniques and machine learning on historical data to make predictions about future events or behaviours."
  level: "A2"
  source: "/a2/unit4/databases-distributed/"

- term: "primary key"
  definition: "uniquely identifies each record. A **foreign key** is a field in one table that references the primary key of another table. A **composite key** is a primary key made up of two or more fields."
  level: "AS"
  source: "/as/unit1/database-systems/"

- term: "Primary Key"
  definition: "- A field (or combination of fields) that uniquely identifies each record in an entity. For example, MemberID."
  level: "AS"
  source: "/as/unit2/analysis-design/"

- term: "Primary key"
  definition: "a field (or combination of fields) that uniquely identifies each record in a file. No two records can share the same primary key value."
  level: "GCSE"
  source: "/gcse/unit1/data-organisation/"

- term: "Primitive data types"
  definition: "are the simplest data types provided by a programming language, from which more complex data structures are built. They include Boolean, character, string, integer, and real (floating point)."
  level: "AS"
  source: "/as/unit1/data-representation/"

- term: "Private** properties enforce **data hiding"
  definition: "other classes cannot directly change the data, which protects it from accidental modification. This is a key part of **encapsulation**."
  level: "GCSE"
  source: "/gcse/unit2/programming-languages/"

- term: "Procedural programming"
  definition: "is a paradigm based on the concept of procedure calls, where programs are built from one or more procedures (sequences of instructions) that operate on data."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "process"
  definition: "is a program in execution. The three main process states are **Ready**, **Running**, and **Blocked (Waiting)**."
  level: "AS"
  source: "/as/unit1/operating-system/"

- term: "Process scheduling"
  definition: "is the method by which the OS determines the order in which processes receive CPU time. The **scheduler** selects a process from the ready queue to move to the running state."
  level: "AS"
  source: "/as/unit1/operating-system/"

- term: "programming paradigm"
  definition: "is a fundamental style or approach to programming that defines how we structure and organise code to solve problems."
  level: "AS"
  source: "/as/unit1/principles-programming/"

- term: "protocol"
  definition: "is a standardised set of rules governing the format, timing, and error handling of data communication between devices on a network."
  level: "AS"
  source: "/as/unit1/hardware-communication/"

- term: "Protocol"
  definition: "a set of agreed rules and standards that allow devices to communicate across a network. Every device on the network must follow the same protocols for successful data exchange."
  level: "GCSE"
  source: "/gcse/unit1/communication/"

- term: "Prototyping"
  definition: "involves building a preliminary version (a **prototype**) of the system to explore requirements, test ideas, and gather user feedback before building the final product."
  level: "AS"
  source: "/as/unit1/systems-analysis/"

- term: "Pseudo-code"
  definition: "is a structured way of writing an algorithm using short English statements. It is not a real programming language, so there is no single correct syntax, but it should be clear and unambiguous."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "Queue"
  definition: "- a First-In-First-Out (FIFO) data structure. The first item added (enqueued) is the first item removed (dequeued). A queue can be visualised as a line of people waiting -- people join at the rear and leave from the front."
  level: "A2"
  source: "/a2/unit3/data-structures/"

- term: "queue"
  definition: "is a FIFO data structure. Items are added at the **rear** and removed from the **front**. A **front pointer** tracks the first item and a **rear pointer** tracks the last item."
  level: "AS"
  source: "/as/unit1/data-structures/"

- term: "Quick sort"
  definition: "- a divide-and-conquer sorting algorithm that selects a **pivot** element, partitions the list into elements less than the pivot and elements greater than the pivot, then recursively sorts the two partitions. Average time complexity is **O(n log n)** but worst case is **O(n^2)**."
  level: "A2"
  source: "/a2/unit3/algorithms-programs/"

- term: "RAD"
  definition: "is a methodology that prioritises rapid prototyping and quick feedback over lengthy planning and documentation. The goal is to produce a working system as quickly as possible."
  level: "AS"
  source: "/as/unit1/systems-analysis/"

- term: "Random (direct) access"
  definition: "allows any record to be accessed directly by calculating its storage address from the key field, typically using a hash function."
  level: "AS"
  source: "/as/unit1/organisation-of-data/"

- term: "Real-Time Processing"
  definition: "- Data is processed immediately as it is received, with results produced fast enough to influence the current process or environment."
  level: "AS"
  source: "/as/unit2/analysis-design/"

- term: "record"
  definition: "is a collection of related fields that represent a single entity (e.g. one customer). A **field** is a single data item within a record (e.g. surname). A **key field** uniquely identifies each record."
  level: "A2"
  source: "/a2/unit4/organisation-data/"

- term: "record"
  definition: "is a data structure that stores a collection of related fields, each of which can be a different data type. Each field is accessed by its **field name** rather than an index."
  level: "AS"
  source: "/as/unit1/data-structures/"

- term: "Record"
  definition: "- A data structure made up of a fixed number of related fields, where each field can be a different data type."
  level: "GCSE"
  source: "/gcse/unit2/data-structures-types/"

- term: "Recursion"
  definition: "- a technique in which a function (or procedure) calls itself in order to solve a problem. Every recursive solution must have a **base case** (a condition that stops the recursion) and a **recursive case** (where the function calls itself with a smaller or simpler input)."
  level: "A2"
  source: "/a2/unit3/algorithms-programs/"

- term: "Recursion"
  definition: "is a technique where a function calls itself to solve a smaller instance of the same problem. Each recursive call works towards a **base case** that stops the recursion. **Iteration** uses loops (for, while) to repeat a block of code."
  level: "AS"
  source: "/as/unit1/algorithms-programs/"

- term: "Refactoring"
  definition: "- The process of restructuring existing code without changing its external behaviour. The goal is to improve readability, reduce duplication, and make the code easier to maintain."
  level: "AS"
  source: "/as/unit2/code-quality/"

- term: "Relationship"
  definition: "- A link or association between two entities (e.g. a Student *enrols on* a Course). Relationships are drawn as lines connecting entities, with a diamond or label on the line."
  level: "AS"
  source: "/as/unit2/analysis-design/"

- term: "requirements specification"
  definition: "(also called a software requirements specification or SRS) is a formal document that describes exactly what the new system must do. It forms a contract between the client and the developers, and all subsequent design, development, and testing are based on it."
  level: "AS"
  source: "/as/unit1/systems-analysis/"

- term: "Reverse Polish Notation (RPN)"
  definition: "- also called **postfix notation** -- is a way of writing arithmetic expressions where the operator comes **after** its operands. For example, the infix expression `3 + 4` is written as `3 4 +` in RPN. It eliminates the need for brackets and operator precedence rules."
  level: "A2"
  source: "/a2/unit3/algorithms-programs/"

- term: "RISC"
  definition: "uses many simple instructions that each execute in one clock cycle. **CISC** uses fewer, more powerful instructions that may take several cycles each. RISC is more power-efficient; CISC can do more per instruction."
  level: "GCSE"
  source: "/gcse/unit1/hardware/"

- term: "RISC (Reduced Instruction Set Computer)"
  definition: "uses a small, highly optimised set of simple instructions, each typically executing in a single clock cycle. Complex operations are built by combining multiple simple instructions."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "rogue value"
  definition: "(also called a **sentinel value**) is a special value entered by the user to signal the end of data input. It must be a value that could **never be valid data** in the context of the program."
  level: "AS"
  source: "/as/unit1/principles-programming/"

- term: "Rogue value"
  definition: "(also called a sentinel value) -- a special value that signals the end of data entry. It is not part of the actual data. For example, entering `-1` to indicate there are no more marks to add."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "Rounding"
  definition: "adjusts the value to the nearest representable number. If the discarded portion is greater than or equal to half the value of the last retained bit, the last retained bit is rounded up."
  level: "A2"
  source: "/a2/unit4/data-representation/"

- term: "Routing"
  definition: "is the process of selecting the optimal path for packets across a network. Routers use **routing tables** to determine the next hop for each packet based on its destination IP address."
  level: "AS"
  source: "/as/unit1/data-transmission/"

- term: "Sampling"
  definition: "the process of measuring an analogue sound wave at regular intervals and converting each measurement into a digital value. Higher sample rate and bit depth produce better quality but larger files."
  level: "GCSE"
  source: "/gcse/unit1/data-organisation/"

- term: "Scope"
  definition: "- The region of a program in which a variable is visible and can be used. Local scope means inside one function; global scope means the entire program."
  level: "GCSE"
  source: "/gcse/unit2/data-structures-types/"

- term: "Second Normal Form (2NF):"
  definition: "A relation is in 2NF if it is in 1NF and every non-key attribute is **fully functionally dependent** on the **whole** primary key (no partial dependencies)."
  level: "A2"
  source: "/a2/unit4/databases-distributed/"

- term: "Secondary storage"
  definition: "is non-volatile storage used for the long-term retention of data and programs. Unlike primary memory (RAM), it retains data when the computer is powered off."
  level: "AS"
  source: "/as/unit1/hardware-communication/"

- term: "Selection"
  definition: "- a decision is made and the program follows one path or another depending on a condition. Common selection statements are `IF...ELSE` and `CASE` / `SELECT`."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "Self-closing tag"
  definition: "a tag that does not need a separate closing tag. Examples include `<img>`, `<hr>` and `<br>` (line break)."
  level: "GCSE"
  source: "/gcse/unit2/programming-languages/"

- term: "Self-documenting code"
  definition: "- Code that is written in such a way that its purpose can be understood from reading the code itself, without needing additional comments. Meaningful identifier names are the most important aspect of self-documenting code."
  level: "AS"
  source: "/as/unit2/code-quality/"

- term: "Self-documenting identifier"
  definition: "- a variable, function, or sub routine name that clearly describes its purpose. For example, `totalScore` is better than `ts`."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "Semantic ambiguity"
  definition: "occurs when a sentence is grammatically clear but can still be interpreted in different ways due to the meaning of the words in context."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "Sequence"
  definition: "- instructions are carried out one after another, in the order they are written."
  level: "GCSE"
  source: "/gcse/unit2/algorithms-and-constructs/"

- term: "sequential file"
  definition: "stores records in order of a **key field**. Searching can be more efficient than serial because the search can stop once the key value has been passed."
  level: "AS"
  source: "/as/unit1/organisation-of-data/"

- term: "serial file"
  definition: "stores records in the order they were entered, with no sorting or logical ordering applied."
  level: "AS"
  source: "/as/unit1/organisation-of-data/"

- term: "Shunting yard algorithm"
  definition: "- an algorithm invented by Edsger Dijkstra that converts infix expressions to postfix (or prefix) notation using a stack. It processes tokens left to right, using the stack to hold operators temporarily while respecting precedence and associativity."
  level: "A2"
  source: "/a2/unit3/algorithms-programs/"

- term: "Sign and magnitude"
  definition: "is a simpler method for representing signed integers. The most significant bit represents the sign (0 = positive, 1 = negative) and the remaining bits represent the magnitude (absolute value) of the number."
  level: "A2"
  source: "/a2/unit4/data-representation/"

- term: "Sign and magnitude"
  definition: "a method of representing signed binary where the MSB indicates the sign (0 = positive, 1 = negative) and the remaining bits represent the value. **Two's complement** — the standard method used by computers to represent signed integers; negative numbers are formed by flipping all bits and adding 1."
  level: "GCSE"
  source: "/gcse/unit1/data-organisation/"

- term: "Simplex"
  definition: "allows one-way communication only. **Half duplex** allows two-way communication but only one direction at a time. **Full duplex** allows simultaneous two-way communication."
  level: "AS"
  source: "/as/unit1/data-transmission/"

- term: "Social engineering"
  definition: "manipulating people into revealing confidential information or performing actions that compromise security, rather than exploiting technical vulnerabilities."
  level: "GCSE"
  source: "/gcse/unit1/security-data-management/"

- term: "Software maintenance"
  definition: "is the modification of a software product after delivery to correct faults, improve performance, or adapt the software to a changed environment. It is the longest and most expensive phase of the software development life cycle."
  level: "AS"
  source: "/as/unit1/software-maintenance/"

- term: "Software maintenance types"
  definition: "The three types of software maintenance are: **Corrective** (fixing bugs), **Adaptive** (adapting to environmental changes), and **Perfective** (improving or enhancing the software). In exam scenarios, identify the trigger to determine the type."
  level: "AS"
  source: "/as/unit1/software-maintenance/"

- term: "Software piracy"
  definition: "is the illegal copying, distribution, or use of copyrighted software. It is a breach of the Copyright, Designs and Patents Act 1988 and can result in criminal prosecution and significant fines."
  level: "AS"
  source: "/as/unit1/ethical-legal-issues/"

- term: "Source code"
  definition: "the original program written by the programmer in a high-level or assembly language. **Object code** (or machine code) — the translated binary version that the CPU can execute directly."
  level: "GCSE"
  source: "/gcse/unit1/program-construction/"

- term: "Space complexity"
  definition: "- a measure of how much additional memory an algorithm requires relative to the input size. Like time complexity, it is expressed using Big O notation. It typically measures **auxiliary space** (extra space beyond the input itself)."
  level: "A2"
  source: "/a2/unit3/algorithms-programs/"

- term: "stable"
  definition: "sorting algorithm preserves the relative order of elements with equal keys. All three algorithms covered here (bubble, insertion, merge) are stable."
  level: "AS"
  source: "/as/unit1/algorithms-programs/"

- term: "Stack"
  definition: "- a Last-In-First-Out (LIFO) data structure. The last item added (pushed) is the first item removed (popped). A stack can be visualised as a pile of plates -- you can only add or remove from the top."
  level: "A2"
  source: "/a2/unit3/data-structures/"

- term: "stack"
  definition: "is a LIFO data structure where items are added (pushed) and removed (popped) from the **top** only. A **stack pointer** keeps track of the position of the top element."
  level: "AS"
  source: "/as/unit1/data-structures/"

- term: "state-transition diagram"
  definition: "models the behaviour of a system by showing its possible states and the events that cause transitions between those states. Each transition may have an associated condition and/or action."
  level: "AS"
  source: "/as/unit1/software-design/"

- term: "stored program concept"
  definition: "states that instructions (the program) and data are stored together in main memory. Instructions are fetched and executed sequentially unless a branch instruction is encountered."
  level: "AS"
  source: "/as/unit1/hardware-communication/"

- term: "structure diagram"
  definition: "visually represents the hierarchical decomposition of a system into modules. It shows which modules call which other modules and provides a clear overview of the system architecture."
  level: "AS"
  source: "/as/unit1/software-design/"

- term: "subroutine"
  definition: "is a named block of code that performs a specific task. Subroutines include both **functions** (which return a value) and **procedures** (which do not return a value). Using subroutines is fundamental to writing structured, modular programs."
  level: "AS"
  source: "/as/unit1/program-design/"

- term: "Subroutine"
  definition: "- A named block of code that performs a specific task. Subroutines are either **procedures** (which do not return a value) or **functions** (which return a value)."
  level: "AS"
  source: "/as/unit2/programming-skills/"

- term: "Subroutine"
  definition: "a named block of code that performs a specific task and can be called from anywhere in the program. There are two types: **procedures** and **functions**."
  level: "GCSE"
  source: "/gcse/unit1/program-construction/"

- term: "Synchronisation"
  definition: "is the coordination of parallel processes to ensure they execute in the correct order and produce consistent results, particularly when accessing shared resources."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "Syntactic ambiguity"
  definition: "occurs when the grammatical structure of a sentence allows more than one interpretation, even though each individual word is clear."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "Syntax"
  definition: "is the set of rules that defines the valid structure of statements in a programming language. Programming language syntax must be completely unambiguous so that every valid program has exactly one interpretation."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "Syntax analysis"
  definition: "the stage of compilation that checks the token stream against the grammar rules of the language and builds a parse tree. If the structure is invalid, syntax errors are reported."
  level: "GCSE"
  source: "/gcse/unit1/program-construction/"

- term: "syntax diagram"
  definition: "(also called a railroad diagram) is a graphical representation of the syntax rules of a language. It uses lines, arrows, and labelled shapes to show the valid sequences of symbols that form a construct."
  level: "A2"
  source: "/a2/unit3/principles-programming/"

- term: "Syntax error"
  definition: "code breaks the language's grammar rules and will not run. **Logic error** — code runs but produces the wrong output. **Runtime error** — code compiles but crashes during execution due to an unexpected condition."
  level: "GCSE"
  source: "/gcse/unit1/program-construction/"

- term: "Systems Development Life Cycle (SDLC)"
  definition: "is a structured framework that defines the stages involved in developing an information system, from initial investigation through to maintenance. It provides a systematic approach to planning, creating, testing, and deploying software."
  level: "AS"
  source: "/as/unit1/systems-analysis/"

- term: "Tag"
  definition: "an HTML keyword surrounded by angle brackets, e.g. `<p>`. Most tags come in pairs: an **opening tag** (`<p>`) and a **closing tag** (`</p>`)."
  level: "GCSE"
  source: "/gcse/unit2/programming-languages/"

- term: "Technical documentation"
  definition: "is aimed at IT professionals and programmers. It describes the internal structure, design, and implementation of the software to support future maintenance and development."
  level: "AS"
  source: "/as/unit1/software-maintenance/"

- term: "test plan"
  definition: "outlines the testing strategy and contains a **test table** that specifies each individual test case, including the test data, expected results, and actual results."
  level: "AS"
  source: "/as/unit1/software-testing/"

- term: "Test plan"
  definition: "- A structured document that lists what will be tested, the test data to be used, the expected outcomes, and the actual outcomes."
  level: "AS"
  source: "/as/unit2/code-quality/"

- term: "Text file"
  definition: "- A file that stores data as plain text, with each line typically representing one piece or row of data."
  level: "GCSE"
  source: "/gcse/unit2/data-structures-types/"

- term: "The digital divide"
  definition: "the gap between those who have access to modern technology and the internet and those who do not. It creates inequality in education, employment, and access to services."
  level: "GCSE"
  source: "/gcse/unit1/ethical-legal-environmental/"

- term: "Third Normal Form (3NF):** A relation is in 3NF if it is in 2NF and there are no **transitive dependencies"
  definition: "no non-key attribute depends on another non-key attribute."
  level: "A2"
  source: "/a2/unit4/databases-distributed/"

- term: "thread"
  definition: "is the smallest unit of processing that can be scheduled by the OS. A single process can contain **multiple threads** that share the same memory space but execute independently."
  level: "AS"
  source: "/as/unit1/operating-system/"

- term: "Top-down design"
  definition: "is a problem-solving approach where a complex problem is broken down into a series of smaller, more manageable sub-problems. Each sub-problem is then further broken down until each part is simple enough to be solved directly. This repeated decomposition is called **stepwise refinement**."
  level: "AS"
  source: "/as/unit1/software-design/"

- term: "trace table"
  definition: "is a technique used to **dry-run** an algorithm by recording the values of variables at each step of execution. It is used to check the correctness of an algorithm and to understand its behaviour."
  level: "AS"
  source: "/as/unit1/algorithms-programs/"

- term: "Transaction file"
  definition: "a temporary file that holds all the changes (additions, deletions, modifications) that need to be applied to the master file. Transactions are collected over a period and then processed in a batch."
  level: "AS"
  source: "/as/unit1/organisation-of-data/"

- term: "translation program"
  definition: "takes source code as input and produces executable code (or an intermediate form) as output. The three types are **compilers**, **interpreters**, and **assemblers**."
  level: "A2"
  source: "/a2/unit3/program-construction/"

- term: "tree"
  definition: "is a hierarchical data structure with a **root** node at the top. Each node may have child nodes. A **binary tree** is a tree where each node has **at most two children** — a left child and a right child."
  level: "AS"
  source: "/as/unit1/data-structures/"

- term: "Truncation"
  definition: "simply removes (discards) the excess bits beyond the available precision. The remaining bits are left unchanged. This always rounds towards zero."
  level: "A2"
  source: "/a2/unit4/data-representation/"

- term: "Truncation"
  definition: "discards excess bits without adjustment, always introducing an error towards zero. **Rounding** adjusts the last retained bit based on the discarded bits, producing a closer approximation. Both introduce errors, but rounding is generally more accurate."
  level: "AS"
  source: "/as/unit1/data-representation/"

- term: "truth table"
  definition: "is a table that shows every possible combination of inputs to a logic gate and the corresponding output. For a gate with `n` inputs, the truth table has `2^n` rows."
  level: "AS"
  source: "/as/unit1/logical-operations/"

- term: "Two's complement"
  definition: "is the standard method for representing signed (positive and negative) integers in binary. The most significant bit (MSB) acts as the sign bit: 0 for positive, 1 for negative. The key advantage is that addition and subtraction work identically for both positive and negative numbers without special handling."
  level: "A2"
  source: "/a2/unit4/data-representation/"

- term: "Two's complement"
  definition: "is a method for representing signed integers where the most significant bit has a negative place value. To negate a number: invert all bits and add 1."
  level: "AS"
  source: "/as/unit1/data-representation/"

- term: "Underflow"
  definition: "occurs in floating point arithmetic when a number is too close to zero to be represented. The exponent becomes more negative than the minimum allowed value, and the number collapses to zero. This is different from overflow, which involves numbers that are too large."
  level: "A2"
  source: "/a2/unit4/data-representation/"

- term: "Universal gate"
  definition: "- a gate that can be used on its own to implement any Boolean function. Both NAND and NOR are universal gates. AND, OR and NOT alone are not universal because none of them individually can produce all the others."
  level: "A2"
  source: "/a2/unit3/logical-operations/"

- term: "user story"
  definition: "is a short, informal description of a feature written from the perspective of an end user. It follows the format: \"As a [type of user], I want [some feature] so that [some benefit].\""
  level: "A2"
  source: "/a2/unit3/systems-analysis/"

- term: "Utility software"
  definition: "is system software that performs specific maintenance, optimisation, or security tasks to support the efficient operation of the computer system."
  level: "AS"
  source: "/as/unit1/operating-system/"

- term: "Utility software"
  definition: "programs that perform maintenance and housekeeping tasks to keep the computer system running smoothly. They support the operating system rather than the user's direct work."
  level: "GCSE"
  source: "/gcse/unit1/system-software/"

- term: "Validation"
  definition: "- The process of checking that data meets specified rules or criteria before it is accepted by the program. Validation checks that data is **reasonable and sensible**, but it cannot guarantee data is **correct**."
  level: "AS"
  source: "/as/unit2/programming-skills/"

- term: "Validation"
  definition: "an automatic check performed by a program to ensure that data entered is **reasonable and sensible** before it is processed. Validation does **not** check if data is correct — only that it is plausible."
  level: "GCSE"
  source: "/gcse/unit2/security-authentication/"

- term: "variable"
  definition: "is a named storage location in memory whose value can change during program execution. A **constant** is a named value that is set once and **cannot be changed** during execution."
  level: "AS"
  source: "/as/unit1/principles-programming/"

- term: "Variable"
  definition: "- A named storage location in memory whose value can change during program execution."
  level: "AS"
  source: "/as/unit2/programming-skills/"

- term: "Variable"
  definition: "- A named storage location in memory whose value can be changed during program execution."
  level: "GCSE"
  source: "/gcse/unit2/data-structures-types/"

- term: "Verification"
  definition: "checks whether the software has been built correctly according to the specification (\"Are we building the product right?\"). **Validation** checks whether the software meets the actual needs of the user (\"Are we building the right product?\")."
  level: "AS"
  source: "/as/unit1/software-testing/"

- term: "Verification"
  definition: "the process of checking that data has been accurately entered or transferred. Methods include **double entry** (entering data twice and comparing), **proofreading** (visually checking), and **check digits** (calculated values appended to data for error detection)."
  level: "GCSE"
  source: "/gcse/unit2/security-authentication/"

- term: "version control system (VCS)"
  definition: "tracks every change made to source code files, recording who made each change, when, and why. It enables multiple developers to work on the same project simultaneously without overwriting each other's work."
  level: "A2"
  source: "/a2/unit3/software-engineering/"

- term: "Virtual memory"
  definition: "uses secondary storage to extend the apparent size of RAM. Pages of a program are swapped between RAM and disk as needed, managed by the OS."
  level: "AS"
  source: "/as/unit1/operating-system/"

- term: "Virtual memory"
  definition: "a technique where a section of the hard drive is used as if it were additional RAM. This allows more programs to run than physical RAM would normally permit, but at a significant speed cost."
  level: "GCSE"
  source: "/gcse/unit1/system-software/"

- term: "Vocabulary dictation"
  definition: "systems convert continuous, natural speech into text. They must handle a large vocabulary, varied sentence structures, and connected words spoken at normal speed."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "Voice print recognition"
  definition: "(speaker verification) is a biometric security system that identifies or verifies a person based on the unique physical characteristics of their voice, rather than understanding what they say."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "Volatile"
  definition: "memory loses its contents when the power supply is removed. **Non-volatile** memory retains its contents without power."
  level: "AS"
  source: "/as/unit1/hardware-communication/"

- term: "Von Neumann Architecture"
  definition: "stores both program instructions and data in the same memory space, accessed via a single shared bus. This creates the **Von Neumann bottleneck** where the CPU must wait for either data or instructions because only one can be fetched at a time."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "Von Neumann architecture"
  definition: "a computer design where program instructions and data share the same memory and bus system. This means only one instruction or data item can be fetched at a time."
  level: "GCSE"
  source: "/gcse/unit1/hardware/"

- term: "Waterfall model"
  definition: "is a sequential, linear approach to software development where each stage must be completed before the next begins. Progress flows in one direction -- like a waterfall -- through a fixed sequence of stages."
  level: "A2"
  source: "/a2/unit3/systems-analysis/"

- term: "Wi-Fi"
  definition: "is a family of wireless networking protocols based on the IEEE 802.11 standards. Wi-Fi allows devices to connect to a local area network (LAN) wirelessly using radio waves."
  level: "A2"
  source: "/a2/unit4/hardware-communication/"

- term: "XOR cipher"
  definition: "- a simple symmetric encryption technique where each bit (or byte) of plaintext is XORed with the corresponding bit (or byte) of a key. Applying the same XOR operation a second time with the same key recovers the original plaintext."
  level: "A2"
  source: "/a2/unit3/logical-operations/"
